<!doctype html>
<html lang='en'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <title>TimeTally - Register</title>
        <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css' rel='stylesheet' integrity='sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD' crossorigin='anonymous'>
        <style>
            form{
                width: 450px;
                margin: auto;
            }
            @media screen and (max-width: 500px) {
                form{
                    margin: auto;
                    margin-top: 5vh;
                    width: 90vw;
                    height: inherit;
                }
            }
        </style>
    </head>
    <body class="bg-primary border border-primary" style="min-height: 100vh;">
        <form method="POST" class="py-5 px-4 my-5 bg-light rounded" enctype="multipart/form-data">
            <h1 class="text-center text-secondary">Time<span class="text-primary">Tally</span></h1>
            <h4 class="mt-5">Register</h4>
            <label for="name" class="my-2">First Name</label>
            <input type="text" name="fname" id="fname" class="form-control">
            <label for="name" class="my-2">Middle Name</label>
            <input type="text" name="mname" id="mname" class="form-control">
            <label for="name" class="my-2">Last Name</label>
            <input type="text" name="lname" id="lname" class="form-control">
            <label for="snumber" class="my-2">Student Number</label>
            <input type="number" name="snumber" id="snumber" class="form-control">
            <label for="password" class="my-2">Password</label>
            <input type="password" name="password" id="password" class="form-control">
            <label for="confirmPassword" class="my-2">Confirm Password</label>
            <input type="password" name="confirmPassword" id="confirmPassword" class="form-control">
            <label for="section" class="my-2">Section</label>
            <select class="form-select my-2" name="section" id="section">
                <option value="SHA-A">SHA-A</option>
                <option value="SHA-B">SHA-B</option>
                <option value="SCVV">SCV</option>
                <option value="SME">SME</option>
                <option value="SEL">SEL</option>
                <option value="HUMSS">HUMSS</option>
                <option value="ABM">ABM</option>
                <option value="SIT">SIT</option>
                <option value="SCS">SCS</option>
                <option value="SCP">SCP</option>
            </select>
            <label for="gradeLevel" class="my-2">Grade Level</label>
            <select class="form-select my-2" name="gradeLevel" id="gradeLevel">
                <option value="Grade 11">Grade 11</option>
                <option value="Grade 12">Grade 12</option>
            </select>
            <label for="profile" class="my-2" >Profile</label>
            <input type="file" name="profile" id="profile" class="form-control my-2">
            <p class="m-0 mt-3" >{{message}}</p>
            <input type="submit" value="Register" class="btn btn-primary mt-3">
            <p class="mt-2">Already have an account? <a href="/">Login</a>.</p>
        </form>
        <script src="https://code.jquery.com/jquery-3.6.4.js" integrity="sha256-a9jBBRygX1Bh5lt8GZjXDzyOB+bWve9EiO7tROUtj/E=" crossorigin="anonymous"></script>
        <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js' integrity='sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN' crossorigin='anonymous'></script>
    </body>
</html>
